<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Khasam TikTok Auto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Khasam Auto TikTok</h1>
    
    <label>Título base:</label>
    <input type="text" id="titulo" placeholder="Escribe tu título aquí">
    
    <label>Duración por video (segundos):</label>
    <input type="number" id="duracion" value="600">
    
    <button id="start">Iniciar Auto TikTok</button>
    
    <div id="log"></div>
</div>

<script src="script.js"></script>
</body>
</html>
